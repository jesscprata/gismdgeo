<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDGEO WebGis</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebar-shell" class="sidebar-shell">
            <aside id="projects-panel" class="sidebar glass-panel" role="complementary" aria-label="Plataforma de Projetos">
                <div class="sidebar-header">
                    <img src="logo.png" alt="MDGEO Logo" class="brand-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <h1 style="display:none; color: var(--primary-color); font-size: 1.8rem;">MDGEO</h1>
                    <p class="app-title">MDGEO WebGis</p>
                    <p class="app-subtitle">Plataforma de Projetos</p>
                </div>
                <div class="sidebar-content">
                    <div class="stats-box">
                        <h3>Total de Projetos</h3>
                        <div id="total-projects" class="stat-value">...</div>
                    </div>
                    
                    <div class="filter-section">
                        <label for="company-filter">Filtrar por Empresa</label>
                        <select id="company-filter" class="glass-select">
                            <option value="all">Todas as Empresas</option>
                        </select>
                    </div>
                    
                    <div class="project-details" id="project-details">
                        <p class="placeholder-text">Clique em um projeto no mapa para visualizar os detalhes.</p>
                    </div>
                </div>
            </aside>
            <button type="button" id="sidebar-toggle" class="sidebar-toggle" aria-label="Ocultar painel" aria-expanded="true">
                <svg class="toggle-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
        </div>

        <main class="map-container">
            <div id="map"></div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Custom JS -->
    <script src="main.js"></script>
    <script src="map-controls.js"></script>
    <script src="panel.js"></script>
</body>
</html>
